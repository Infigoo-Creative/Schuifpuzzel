<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="400" fill="#1f2125"/>
  <g stroke="#15161a" stroke-width="6">
    <!-- top face -->
    <polygon points="200,40 340,110 200,180 60,110" fill="#f5f5f5"/>
    <line x1="200" y1="40" x2="200" y2="180"/>
    <line x1="60" y1="110" x2="340" y2="110"/>
    <line x1="130" y1="75" x2="130" y2="145"/>
    <line x1="270" y1="75" x2="270" y2="145"/>
    <line x1="95" y1="92" x2="305" y2="92"/>
    <line x1="95" y1="128" x2="305" y2="128"/>
    <!-- left face -->
    <polygon points="60,110 200,180 200,320 60,250" fill="#ffd400"/>
    <line x1="60" y1="180" x2="200" y2="250"/>
    <line x1="130" y1="145" x2="130" y2="285"/>
    <line x1="60" y1="145" x2="200" y2="215"/>
    <line x1="60" y1="215" x2="200" y2="285"/>
    <!-- right face -->
    <polygon points="200,180 340,110 340,250 200,320" fill="#e0282d"/>
    <line x1="200" y1="250" x2="340" y2="180"/>
    <line x1="270" y1="145" x2="270" y2="285"/>
    <line x1="200" y1="215" x2="340" y2="145"/>
    <line x1="200" y1="285" x2="340" y2="215"/>
  </g>
</svg>
